name: CD

on:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    working-directory: mikoton-commercial-proposals

concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-private-artifact:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: mikoton-commercial-proposals/.nvmrc
          cache: yarn
          cache-dependency-path: mikoton-commercial-proposals/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn test:unit

      - name: Build private tarball locally
        run: yarn twenty dev:build --tarball .

      - name: Validate tarball without publishing
        run: |
          tarball="$(find .twenty/output -name '*.tgz' -type f | head -n 1)"
          if [ -z "$tarball" ]; then
            echo "No .tgz tarball was created"
            exit 1
          fi
          if [ ! -s "$tarball" ]; then
            echo "Tarball is empty: $tarball"
            exit 1
          fi
          tar -tzf "$tarball" | grep -q 'manifest.json'
          tar -tzf "$tarball" | grep -q 'front-components'
          tar -tzf "$tarball" | grep -q 'logic-functions'
          if tar -tzf "$tarball" | grep -E '(^|/)\.env($|\.|/)'; then
            echo "Tarball contains env files"
            exit 1
          fi
          sha256sum "$tarball"

      - name: Confirm no internal deployment
        run: |
          echo "This workflow intentionally does not publish or install the app."
          echo "Production private tarball is built and deployed locally inside the internal network."
