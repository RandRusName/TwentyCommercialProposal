name: CI

on:
  push:
    branches:
      - main
  pull_request: {}

permissions:
  contents: read

env:
  TWENTY_VERSION: v2.20.0

defaults:
  run:
    working-directory: mikoton-commercial-proposals

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Spawn Twenty test instance
        id: twenty
        uses: twentyhq/twenty/.github/actions/spawn-twenty-app-dev-test@twenty/v2.20.0
        with:
          twenty-version: ${{ env.TWENTY_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: mikoton-commercial-proposals/.nvmrc
          cache: yarn
          cache-dependency-path: mikoton-commercial-proposals/yarn.lock

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn test:unit

      - name: Integration tests
        run: yarn test
        env:
          TWENTY_RUN_REMOTE_SMOKE: 'true'
          TWENTY_API_URL: ${{ steps.twenty.outputs.server-url }}
          TWENTY_API_KEY: ${{ steps.twenty.outputs.api-key }}

      - name: Build app
        run: yarn twenty dev:build .
