name: CI

on:
  push:
    branches:
      - main
  pull_request: {}

permissions:
  contents: read

env:
  TWENTY_VERSION: v2.20.0

defaults:
  run:
    working-directory: mikoton-commercial-proposals

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Spawn Twenty test instance
        id: twenty
        uses: twentyhq/twenty/.github/actions/spawn-twenty-app-dev-test@twenty/v2.20.0
        with:
          twenty-version: ${{ env.TWENTY_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: mikoton-commercial-proposals/.nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn test:unit

      - name: Integration tests
        run: yarn test:integration
        env:
          TWENTY_TEST_INSTANCE_MODE: ephemeral
          TWENTY_API_URL: ${{ steps.twenty.outputs.server-url }}
          TWENTY_API_KEY: ${{ steps.twenty.outputs.api-key }}

      - name: Build app
        run: yarn twenty dev:build .

      - name: Build private tarball
        run: yarn twenty dev:build --tarball .

      - name: Validate tarball
        run: |
          tarball="$(find .twenty/output -name '*.tgz' -type f | head -n 1)"
          if [ -z "$tarball" ]; then
            echo "No .tgz tarball was created"
            exit 1
          fi
          if [ ! -s "$tarball" ]; then
            echo "Tarball is empty: $tarball"
            exit 1
          fi
          tar -tzf "$tarball" | grep -q 'manifest.json'
          tar -tzf "$tarball" | grep -q 'front-components'
          tar -tzf "$tarball" | grep -q 'logic-functions'
          if tar -tzf "$tarball" | grep -E '(^|/)\.env($|\.|/)'; then
            echo "Tarball contains env files"
            exit 1
          fi
          sha256sum "$tarball"
