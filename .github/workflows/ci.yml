name: CI

on:
  push:
    branches:
      - main
  pull_request: {}

permissions:
  contents: read

env:
  TWENTY_VERSION: v2.20.0

defaults:
  run:
    working-directory: mikoton-commercial-proposals

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262

      - name: Start ephemeral Twenty and document service
        id: twenty
        shell: bash
        run: |
          set -Eeuo pipefail

          document_secret="$(openssl rand -hex 32)"
          echo "::add-mask::$document_secret"
          echo "CI_DOCUMENT_SERVICE_SECRET=$document_secret" >> "$GITHUB_ENV"
          echo "server-url=http://localhost:2021" >> "$GITHUB_OUTPUT"
          ephemeral_api_key="${{ secrets.TWENTY_EPHEMERAL_API_KEY }}"
          if [ -z "$ephemeral_api_key" ]; then
            echo "TWENTY_EPHEMERAL_API_KEY secret is required for ephemeral integration tests"
            exit 1
          fi
          echo "::add-mask::$ephemeral_api_key"
          echo "api-key=$ephemeral_api_key" >> "$GITHUB_OUTPUT"

          docker network create twenty-app-ci
          docker run -d \
            --name minio \
            --network twenty-app-ci \
            -e MINIO_ROOT_USER=ci-minio \
            -e MINIO_ROOT_PASSWORD=ci-minio-password \
            minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e server /data
          docker run --rm \
            --network twenty-app-ci \
            --entrypoint /bin/sh \
            minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727 \
            -c 'until mc alias set ci http://minio:9000 ci-minio ci-minio-password; do sleep 2; done; mc mb --ignore-existing ci/commercial-proposals; mc anonymous set none ci/commercial-proposals; printf "%s" "{\"Version\":\"2012-10-17\",\"Statement\":[{\"Effect\":\"Allow\",\"Action\":[\"s3:GetBucketLocation\",\"s3:ListBucket\"],\"Resource\":[\"arn:aws:s3:::commercial-proposals\"]},{\"Effect\":\"Allow\",\"Action\":[\"s3:GetObject\",\"s3:PutObject\",\"s3:DeleteObject\"],\"Resource\":[\"arn:aws:s3:::commercial-proposals/commercial-proposals/*\"]}]}" > /tmp/policy.json; mc admin user add ci ci-worker ci-worker-secret; mc admin policy create ci commercial-proposals-worker /tmp/policy.json; mc admin policy attach ci commercial-proposals-worker --user ci-worker'

          docker build \
            -f document-service/Dockerfile \
            -t mikoton-document-service:ci \
            .
          docker run -d \
            --name document-service \
            --network twenty-app-ci \
            -e DOCUMENT_SERVICE_SECRET="$document_secret" \
            -e DOCUMENT_STORAGE_TYPE=s3-compatible \
            -e MINIO_ENDPOINT=http://minio:9000 \
            -e DOCUMENT_STORAGE_ACCESS_KEY=ci-worker \
            -e DOCUMENT_STORAGE_SECRET_KEY=ci-worker-secret \
            -e MINIO_BUCKET=commercial-proposals \
            -e MINIO_SECURE=false \
            -e MINIO_PUBLIC_BASE_URL=http://minio:9000 \
            mikoton-document-service:ci

          docker run -d \
            --name twenty-app-dev-test \
            --network twenty-app-ci \
            -p 2021:2021 \
            -e NODE_PORT=2021 \
            -e SERVER_URL=http://localhost:2021 \
            -e LOGIC_FUNCTION_TYPE=LOCAL \
            -e MARKETPLACE_CATALOG_SYNC_CRON_ENABLED=false \
            -e API_RATE_LIMITING_SHORT_LIMIT=100000 \
            -e API_RATE_LIMITING_LONG_LIMIT=100000 \
            twentycrm/twenty-app-dev:${TWENTY_VERSION}@sha256:c43f61779cefd8e5c3f161d585aae919bb2e288102ebec528883c748fb4b1d74

          timeout=180
          elapsed=0
          until curl -fsS http://localhost:2021/healthz >/dev/null 2>&1; do
            if [ "$elapsed" -ge "$timeout" ]; then
              docker logs twenty-app-dev-test 2>&1 | tail -80
              exit 1
            fi
            sleep 3
            elapsed=$((elapsed + 3))
          done

          elapsed=0
          until docker exec document-service \
            curl -fsS http://127.0.0.1:8010/readyz >/dev/null 2>&1; do
            if [ "$elapsed" -ge "$timeout" ]; then
              docker logs document-service 2>&1 | tail -80
              exit 1
            fi
            sleep 3
            elapsed=$((elapsed + 3))
          done

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version-file: mikoton-commercial-proposals/.nvmrc

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Unit tests
        run: yarn test:unit

      - name: Document service tests
        run: yarn test:document-service

      - name: Secret scan
        run: yarn test:secrets

      - name: Private-network URL scan
        run: yarn test:private-urls

      - name: Integration tests
        run: yarn test:integration
        env:
          TWENTY_TEST_INSTANCE_MODE: ephemeral
          TWENTY_API_URL: ${{ steps.twenty.outputs.server-url }}
          TWENTY_API_KEY: ${{ steps.twenty.outputs.api-key }}
          TWENTY_APP_INTERNAL_API_URL: http://twenty-app-dev-test:2021
          CI_DOCUMENT_SERVICE_URL: http://document-service:8010

      - name: Build app
        run: yarn twenty dev:build .

      - name: Build private tarball
        run: yarn twenty dev:build --tarball .

      - name: Validate tarball
        run: |
          tarball="$(find .twenty/output -name '*.tgz' -type f | head -n 1)"
          if [ -z "$tarball" ]; then
            echo "No .tgz tarball was created"
            exit 1
          fi
          if [ ! -s "$tarball" ]; then
            echo "Tarball is empty: $tarball"
            exit 1
          fi
          tar -tzf "$tarball" | grep -q 'manifest.json'
          tar -tzf "$tarball" | grep -q 'front-components'
          tar -tzf "$tarball" | grep -q 'logic-functions'
          if tar -tzf "$tarball" | grep -E '(^|/)\.env($|\.|/)'; then
            echo "Tarball contains env files"
            exit 1
          fi
          if tar -xOzf "$tarball" | strings | grep -E '(BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY|TWENTY_API_KEY=[^[:space:]]+|DOCUMENT_SERVICE_SECRET=[^[:space:]]+)'; then
            echo "Tarball contains secret-like material"
            exit 1
          fi
          sha256sum "$tarball"
