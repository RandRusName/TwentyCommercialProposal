services:
  document-service:
    build:
      context: .
      dockerfile: document-service/Dockerfile
    image: mikoton-commercial-proposals/document-service:local
    restart: unless-stopped
    environment:
      DOCUMENT_SERVICE_HOST: 0.0.0.0
      DOCUMENT_SERVICE_PORT: 8010
      DOCUMENT_SERVICE_SECRET: ${DOCUMENT_SERVICE_SECRET:?DOCUMENT_SERVICE_SECRET is required}
      DOCUMENT_MAX_REQUEST_BYTES: 2097152
      DOCUMENT_STORAGE_TYPE: s3-compatible
      DOCUMENT_TEMP_PATH: /tmp/mikoton-document-service
      DOCUMENT_TEMPLATE_V1_PATH: /app/templates/mikoton-commercial-proposal-v1.xlsm
      DOCUMENT_MAPPING_V1_PATH: /app/templates/mikoton-commercial-proposal-v1.mapping.json
      DOCUMENT_TEMPLATE_V2_PATH: /app/templates/mikoton-commercial-proposal-v2.xlsx
      DOCUMENT_MAPPING_V2_PATH: /app/templates/mikoton-commercial-proposal-v2.mapping.json
      DOCUMENT_SIGNED_URL_TTL_SECONDS: 900
      LIBREOFFICE_BINARY: libreoffice
      PDF_ENGINE: libreoffice
      GENERATION_TIMEOUT_SECONDS: 90
      MINIO_ENDPOINT: http://minio:9000
      DOCUMENT_STORAGE_ACCESS_KEY: ${DOCUMENT_STORAGE_ACCESS_KEY:?DOCUMENT_STORAGE_ACCESS_KEY is required}
      DOCUMENT_STORAGE_SECRET_KEY: ${DOCUMENT_STORAGE_SECRET_KEY:?DOCUMENT_STORAGE_SECRET_KEY is required}
      MINIO_BUCKET: commercial-proposals
      MINIO_SECURE: "false"
      MINIO_PUBLIC_BASE_URL: ${MINIO_PUBLIC_BASE_URL:-}
    depends_on:
      minio:
        condition: service_healthy
      minio-create-bucket:
        condition: service_completed_successfully
    expose:
      - "8010"
    networks:
      - twenty_default

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z@sha256:14cea493d9a34af32f524e538b8346cf79f3321eff8e708c1e2960462bd8936e
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - mikoton-commercial-proposals-minio:/data
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - twenty_default

  minio-create-bucket:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z@sha256:a7fe349ef4bd8521fb8497f55c6042871b2ae640607cf99d9bede5e9bdf11727
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER}\" \"$${MINIO_ROOT_PASSWORD}\" &&
      mc mb --ignore-existing local/commercial-proposals &&
      mc anonymous set none local/commercial-proposals &&
      (mc admin user info local \"$${DOCUMENT_STORAGE_ACCESS_KEY}\" >/dev/null 2>&1 ||
        mc admin user add local \"$${DOCUMENT_STORAGE_ACCESS_KEY}\" \"$${DOCUMENT_STORAGE_SECRET_KEY}\") &&
      (mc admin policy info local commercial-proposals-worker >/dev/null 2>&1 ||
        mc admin policy create local commercial-proposals-worker /config/minio-policy.json) &&
      mc admin policy attach local commercial-proposals-worker --user \"$${DOCUMENT_STORAGE_ACCESS_KEY}\"
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      DOCUMENT_STORAGE_ACCESS_KEY: ${DOCUMENT_STORAGE_ACCESS_KEY:?DOCUMENT_STORAGE_ACCESS_KEY is required}
      DOCUMENT_STORAGE_SECRET_KEY: ${DOCUMENT_STORAGE_SECRET_KEY:?DOCUMENT_STORAGE_SECRET_KEY is required}
    volumes:
      - ./document-service/minio-policy.json:/config/minio-policy.json:ro
    networks:
      - twenty_default

volumes:
  mikoton-commercial-proposals-minio:

networks:
  twenty_default:
    external: true
